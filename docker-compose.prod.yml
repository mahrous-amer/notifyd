services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifyd
      POSTGRES_USER: notifyd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifyd"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    image: ${DOCKER_REGISTRY:-ghcr.io/bse}/notifyd-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "${API_PORT:-8080}:8080"
    env_file: .env
    environment:
      DATABASE_URL: "postgres://notifyd:${POSTGRES_PASSWORD}@postgres:5432/notifyd?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    image: ${DOCKER_REGISTRY:-ghcr.io/bse}/notifyd-worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: "postgres://notifyd:${POSTGRES_PASSWORD}@postgres:5432/notifyd?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  admin-bot:
    image: ${DOCKER_REGISTRY:-ghcr.io/bse}/notifyd-admin-bot:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-bot
    env_file: .env
    environment:
      DATABASE_URL: "postgres://notifyd:${POSTGRES_PASSWORD}@postgres:5432/notifyd?sslmode=disable"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_CHAT: ${TELEGRAM_ADMIN_CHAT}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f admin-bot || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles:
      - admin-bot
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
