services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifyd
      POSTGRES_USER: notifyd
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifyd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      API_PORT: "8080"
      DATABASE_URL: "postgres://notifyd:password@postgres:5432/notifyd?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SIGNING_KEY: "change-me-to-a-secure-256-bit-key-in-production"
      JWT_EXPIRATION: "1h"
      JWT_ISSUER: "notifyd"
      WORKER_CONCURRENCY: "10"
      MAX_RETRIES: "5"
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: "postgres://notifyd:password@postgres:5432/notifyd?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SIGNING_KEY: "change-me-to-a-secure-256-bit-key-in-production"
      WORKER_CONCURRENCY: "10"
      MAX_RETRIES: "5"
      MIN_RETRY_DELAY: "15s"
      MAX_RETRY_DELAY: "30m"
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  asynqmon:
    image: hibiken/asynqmon:latest
    ports:
      - "8081:8080"
    command:
      - "--redis-addr=redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # The admin-bot service is optional. It only starts when TELEGRAM_BOT_TOKEN
  # is explicitly provided. To run it:
  #   TELEGRAM_BOT_TOKEN=<token> TELEGRAM_ADMIN_CHAT=<chat_id> docker compose up admin-bot
  admin-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-bot
    environment:
      DATABASE_URL: "postgres://notifyd:password@postgres:5432/notifyd?sslmode=disable"
      JWT_SIGNING_KEY: "change-me-to-a-secure-256-bit-key-in-production"
      MAX_RETRIES: "5"
      LOG_LEVEL: "info"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_ADMIN_CHAT: "${TELEGRAM_ADMIN_CHAT}"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - admin-bot
    restart: unless-stopped

volumes:
  pgdata:
